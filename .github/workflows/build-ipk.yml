name: Build IPK

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (optional, e.g. 1.0.0)"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BASE="$(sed -n 's/^PKG_VERSION:=//p' luci-app-gl-portable-backup/Makefile)"
            VERSION="${BASE:-0.0.0}-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build package
        shell: bash
        run: |
          chmod +x pkg/build.sh
          ./pkg/build.sh "${{ steps.vars.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-gl-portable-backup_${{ steps.vars.outputs.version }}_all.ipk
          path: build/out/*.ipk
          if-no-files-found: error
          retention-days: 30

      # Release steps run only on version tags (pushed by maintainers), never on
      # pull requests — so fork/contributor PRs build + upload an artifact but
      # cannot publish a release or touch repository contents.
      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cd build/out
          cp "luci-app-gl-portable-backup_${{ steps.vars.outputs.version }}_all.ipk" \
             "luci-app-gl-portable-backup_latest_all.ipk"
          sha256sum luci-app-gl-portable-backup_*.ipk > SHA256SUMS

      - name: Publish GitHub release (beta / prerelease)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            build/out/luci-app-gl-portable-backup_${{ steps.vars.outputs.version }}_all.ipk
            build/out/luci-app-gl-portable-backup_latest_all.ipk
            build/out/SHA256SUMS
